<!DOCTYPE html>
<html>
<head>
    <title>QGIS System Hub Portal</title>
    <style>
        :root {
            --bg: #f8fafc;
            --primary: #0f172a;
            --accent: #2563eb;
            --border: #e2e8f0;
        }
        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .portal-card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        p {
            color: #64748b;
            margin: 0 0 30px 0;
            font-size: 0.95rem;
        }
        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .portal-btn {
            display: block;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-secondary {
            background: white;
            color: #334155;
        }
        .btn-secondary:hover {
            background: #f1f5f9;
        }
    </style>
</head>
<body>

<div class="portal-card">
    <h1>🗺️ GeoSpatial Production Portal</h1>
    <p>Daily Tracking & Analytical Dashboard System</p>
    
    <div class="menu-links">
        <a href="/index" class="portal-btn btn-primary">📋 Open Master Spreadsheet</a>
        <a href="/add" class="portal-btn btn-secondary">➕ Log New Production Record</a>
        <a href="/employee_report" class="portal-btn btn-secondary">👤 View Individual Employee Reports</a>
    </div>
</div>

</body>
</html>
