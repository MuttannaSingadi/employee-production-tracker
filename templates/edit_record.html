<!DOCTYPE html>
<html>
<head>
    <title>Edit Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_Style.css') }}">
    <style>
        .meta-prev-info {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 4px;
            display: block;
            font-style: italic;
        }
        /* Styling match for the formula view in image_f55a45.png */
        .formula-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .formula-input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-header">
        <h2>Edit Record (ID: {{ record.id }})</h2>
        <div class="action-buttons">
            <button type="button" class="ctrl-btn add-btn" onclick="addNewFieldGroup()">+ Add Section</button>
            <button type="button" class="ctrl-btn clear-btn" onclick="clearLastFieldGroup()">- Clear Last</button>
        </div>
    </div>
    
    <form method="POST" onsubmit="evaluateFormFormulas(event)">
        <div id="dynamic-fields-container">
            <div class="form-row-group">
                <div class="form-group">
                    <label for="bike_line">Project Type</label>
                    <select id="bike_line" name="bike_line" required style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <option value="Damage" {% if record.bike_line == 'Damage' %}selected{% endif %}>Damage</option>
                        <option value="Mohnl" {% if record.bike_line == 'Mohnl' %}selected{% endif %}>Mohnl</option>
                        <option value="Gally" {% if record.bike_line == 'Gally' %}selected{% endif %}>Gally</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Part Number (Read Only)</label>
                    <input type="text" value="{{ record.part_no }}" readonly style="background-color: #f3f4f6; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="linear_km">Linear KM</label>
                    <input type="number" id="linear_km" step="0.01" name="linear_km" value="{{ record.linear_km or 0 }}">
                </div>

                <div class="form-group">
                    <label for="estimation">Estimation</label>
                    <input type="number" id="estimation" step="0.01" name="estimation" value="{{ record.estimation or 0 }}">
                </div>

                <div class="form-group">
                    <label for="employee_name">Alloted To</label>
                    <input type="text" id="employee_name" name="employee_name" value="{{ record.employee_name or '' }}" placeholder="Employee Name">
                </div>

                <div class="form-group">
                    <label for="start_date">Start Date</label>
                    <input type="date" id="start_date" name="start_date" value="{{ record.start_date or '' }}">
                </div>

                <div class="form-group">
                    <label for="end_date">End Date</label>
                    <input type="date" id="end_date" name="end_date" value="{{ record.end_date or '' }}">
                </div>

                <div class="form-group">
                    <label for="completed_km">Completed KM</label>
                    <input type="number" id="completed_km" step="0.01" name="completed_km" value="{{ record.completed_km or 0 }}">
                </div>

                <div class="form-group">
                    <label for="pending_km">Pending KM</label>
                    <input type="number" id="pending_km" step="0.01" name="pending_km" value="{{ record.pending_km or 0 }}" readonly style="background-color: #f3f4f6;">
                </div>

                <!-- Time Taken Formula Field -->
                <div class="form-group">
                    <label for="time_taken">Time Taken</label>
                    <input type="text" id="time_taken" name="time_taken" class="formula-input" value="{{ record.time_taken or 0 }}">
                    <span class="meta-prev-info">Previous Logged: {{ record.time_taken or 0 }} Hrs</span>
                </div>

                <!-- Count Formula Field (Matching image_f55a45.png) -->
                <div class="form-group">
                    <label for="count_val">COUNT</label>
                    <input type="text" id="count_val" name="count_val" class="formula-input" value="{{ record.count_val or 0 }}">
                    <span class="meta-prev-info">Previous Logged Count: {{ record.count_val or 0 }}</span>
                </div>

                <div class="form-group">
                    <label for="progress_status">Status</label>
                    <select id="progress_status" name="progress_status">
                        <option value="IP" {% if record.progress_status == 'IP' %}selected{% endif %}>IP</option>
                        <option value="COMP" {% if record.progress_status == 'COMP' %}selected{% endif %}>COMP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="new_column_text">New Notes COLUMN</label>
                    <input type="text" id="new_column_text" name="new_column_text" value="{{ record.new_column_text or '' }}" placeholder="Enter logs text...">
                </div>

                <div class="form-group">
                    <label for="new_column_numeric">New Value Column</label>
                    <input type="number" id="new_column_numeric" step="0.01" name="new_column_numeric" value="{{ record.new_column_numeric or 0 }}">
                </div>
            </div>

            {% if record.extra_data %}
                {% for key, val in record.extra_data.items() %}
                <div class="form-row-group extra-group">
                    <hr class="group-divider">
                    <div class="form-group">
                        <label>Extra Metric Label</label>
                        <input type="text" name="extra_metric_name[]" value="{{ key }}">
                    </div>
                    <div class="form-group">
                        <label>Extra Value</label>
                        <input type="text" name="extra_metric_value[]" value="{{ val }}">
                    </div>
                </div>
                {% endfor %}
            {% endif %}
        </div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="submit" class="submit-btn" style="flex: 1;">Update Changes</button>
            <a href="/index" class="submit-btn" style="background-color: #64748b; text-decoration: none; text-align: center; line-height: 40px; height: 40px; padding: 0;">Cancel</a>
        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const linearInput = document.getElementById('linear_km');
    const completedInput = document.getElementById('completed_km');
    if (linearInput && completedInput) {
        linearInput.addEventListener('input', calculatePendingKM);
        completedInput.addEventListener('input', calculatePendingKM);
    }
});

function calculatePendingKM() {
    const linearKM = parseFloat(document.getElementById('linear_km').value) || 0;
    const completedKM = parseFloat(document.getElementById('completed_km').value) || 0;
    const pendingKM = linearKM - completedKM;
    document.getElementById('pending_km').value = pendingKM >= 0 ? pendingKM.toFixed(2) : "0.00";
}

// Safely parses mathematical string inputs like "90+80" right before the form submits to the backend
function evaluateFormFormulas(event) {
    const fieldsToEvaluate = ['count_val', 'time_taken'];
    
    fieldsToEvaluate.forEach(id => {
        const input = document.getElementById(id);
        if (input) {
            let expr = input.value.trim();
            // Sanitize expression to only allow digits, decimals, plus signs, and spaces
            if (/^[\d.+\s-]+$/.test(expr)) {
                try {
                    // Evaluate math addition safely
                    const calculatedValue = Function(`"use strict"; return (${expr})`)();
                    input.value = calculatedValue;
                } catch (e) {
                    console.error("Invalid math expression in field: " + id);
                }
            }
        }
    });
}

function addNewFieldGroup() {
    const container = document.getElementById('dynamic-fields-container');
    const newGroup = document.createElement('div');
    newGroup.className = 'form-row-group extra-group';
    newGroup.innerHTML = `
        <hr class="group-divider">
        <div class="form-group">
            <label>Extra Metric Label</label>
            <input type="text" name="extra_metric_name[]" placeholder="e.g. QC Status">
        </div>
        <div class="form-group">
            <label>Extra Value</label>
            <input type="text" name="extra_metric_value[]" placeholder="Value">
        </div>
    `;
    container.appendChild(newGroup);
}

function clearLastFieldGroup() {
    const container = document.getElementById('dynamic-fields-container');
    const extraGroups = container.getElementsByClassName('extra-group');
    if (extraGroups.length > 0) {
        container.removeChild(extraGroups[extraGroups.length - 1]);
    }
}
</script>
</body>
</html>
